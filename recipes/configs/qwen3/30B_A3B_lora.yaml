# Qwen3-30B-A3B-Instruct-2507 LoRA SFT on Darkyy/indic-instruct-v1
#
# export HF_TOKEN="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"
# CPATH="/home/ishaan/.local/share/uv/python/cpython-3.12.13-linux-x86_64-gnu/include/python3.12" \
# WANDB_API_KEY="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" \
# CUDA_VISIBLE_DEVICES=4,5,6,7 \
# uv run tune run --nproc_per_node 4 lora_finetune_distributed \
#   --config /home/ishaan/torchtune/recipes/configs/qwen3/30B_A3B_lora.yaml

output_dir: /home/ishaan/torchtune/checkpoints/qwen3_30B_A3B/lora

model:
  _component_: torchtune.models.qwen3.lora_qwen3_30b_a3b
  lora_attn_modules: ['q_proj', 'k_proj', 'v_proj', 'output_proj']
  apply_lora_to_mlp: True
  apply_lora_to_output: False
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.0

tokenizer:
  _component_: torchtune.models.qwen3.qwen3_tokenizer
  path: /tmp/Qwen3-30B-A3B-Instruct-2507/vocab.json
  merges_file: /tmp/Qwen3-30B-A3B-Instruct-2507/merges.txt
  max_seq_len: 4096

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: /tmp/Qwen3-30B-A3B-Instruct-2507
  checkpoint_files:
    filename_format: model-{}-of-{}.safetensors
    max_filename: "00016"
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: QWEN3_MOE
save_adapter_weights_only: True
resume_from_checkpoint: False

dataset:
  _component_: torchtune.datasets.chat_dataset
  source: Darkyy/indic-instruct-v1
  conversation_column: messages
  conversation_style: openai
  train_on_input: False
  new_system_prompt: "You are a helpful AI assistant fluent in Hindi (हिन्दी), Gujarati (ગુજરાતી), Tamil (தமிழ்), and Marathi (मराठी), as well as English. You always respond in the native script of the language being spoken.\n\nCore principles:\n- Always reply in the native script of the language. Hindi and Marathi in Devanagari, Gujarati in Gujarati script, Tamil in Tamil script, English in Latin script. Never use romanized or transliterated forms.\n- Even if the user writes in romanized form, always respond in the proper native script.\n- Use grammatically correct, natural-sounding language. Prioritize proper grammar, appropriate vocabulary, and fluent sentence structure over literal translation from English.\n- Respect the conventions and idioms of each language. Write the way a native speaker would — not translated English.\n- Follow the user's instructions precisely and provide clear, well-organized, and complete responses.\n- Be direct and helpful. Avoid unnecessary filler, preamble, or apologies."
  packed: True
  filter_fn: torchtune.datasets._filters.valid_chat_messages
  split: train
seed: 42
shuffle: True

run_val_every_n_steps: 500
dataset_val:
  _component_: torchtune.datasets.chat_dataset
  source: Darkyy/indic-instruct-v1
  conversation_column: messages
  conversation_style: openai
  train_on_input: False
  new_system_prompt: "You are a helpful, knowledgeable, and precise AI assistant. You are fluent in English, Hindi, Marathi, Gujarati, and Tamil — in both their native scripts and romanized (transliterated) forms.\n\nCore principles:\n- Respond in the same language and script the user writes in. If they write in romanized Hindi, reply in romanized Hindi. If they write in Tamil script, reply in Tamil script. If they write in English, reply in English.\n- Provide thorough, well-structured, and accurate responses. Prioritize correctness and clarity.\n- You excel at mathematics, science, coding, logical reasoning, and analytical tasks regardless of the language used.\n- You can use tools and call functions when provided. Follow tool schemas precisely and return well-formed tool calls.\n- Be direct. Avoid unnecessary preamble, filler, or apologies. Get to the substance of the answer."
  packed: True
  split: "train[-500:]"
batch_size_val: 4

batch_size: 12
optimizer:
  _component_: torch.optim.AdamW
  lr: 1e-4
  weight_decay: 0.01
  fused: True
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 60
optimizer_in_bwd: False
loss:
  _component_: torchtune.modules.loss.LinearCrossEntropyLoss

epochs: 3
max_steps_per_epoch: null
gradient_accumulation_steps: 1
clip_grad_norm: 1.0

compile: False
enable_activation_checkpointing: True
enable_activation_offloading: False
custom_sharded_layers: ['tok_embeddings']
fsdp_cpu_offload: False
fsdp_reshard_after_forward: False

log_expert_metrics: True

device: cuda
dtype: bf16

metric_logger:
  _component_: torchtune.training.metric_logging.WandBLogger
  project: electron-v2
  entity: smallest-ai
  name: indic-instruct-v1-sft-run-1
  log_dir: ${output_dir}/logs
log_every_n_steps: 1
log_peak_memory_stats: True
log_level: INFO

profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False
  output_dir: ${output_dir}/profiling_outputs
  cpu: True
  cuda: True
  profile_memory: False
  with_stack: False
  record_shapes: True
  with_flops: False
  wait_steps: 5
  warmup_steps: 5
  active_steps: 2
  num_cycles: 1
